- name: Create a folder
  community.general.jenkins_job:
    config: "{{ lookup('template', 'templates/folder.xml') }}"
    name: "{{ item.name }}"
    password: admin
    url: http://jenkins-int.nareshdevops1218.online:8080
    user: admin
  loop: "{{ folder }}"

- name: Create a jenkins job using basic authentication
  community.general.jenkins_job:
    config: "{{ lookup('template', 'templates/job.xml') }}"
    name: "{{ folder[0].name }}/{{ item.name }}"
    password: admin
    url: http://jenkins-int.nareshdevops1218.online:8080
    user: admin
  loop: "{{ jobs }}"